# Connection header for WebSocket reverse proxy
map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    server_name you.domain.com;

    listen 443 ssl reuseport;
    listen [::]:443 ssl reuseport;
    http2 on;
    charset utf-8;
    charset_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml;

    # Docker DNS resolver для динамического разрешения имен контейнеров
    # Это позволяет nginx стартовать даже если upstream недоступен
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_altshop altshop:5000;

    # Landing Page - статический frontend для корневого домена
    location = / {
        return 302 /webapp/;
    }

    location = /webapp {
        return 301 /webapp/;
    }

    # Serve SPA root through explicit index target; missing index returns 404 (not 500 cycle)
    location = /webapp/ {
        root /opt/altshop;
        try_files /webapp/index.html =404;
    }

    # SPA entry point served directly to prevent rewrite cycles when fallback points to index.html
    location = /webapp/index.html {
        alias /opt/altshop/webapp/index.html;
    }

    location ~* ^/(webapp|assets)/.*\.map$ {
        return 404;
    }

    # Web App (Mini App) - статический frontend (раздаётся напрямую из nginx)
    location /webapp/ {
        alias /opt/altshop/webapp/;
        index index.html;

        # SPA routing - serve static files first, then fallback to index.html
        try_files $uri $uri/ /webapp/index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Assets для лендинга и webapp
    location /assets/ {
        alias /opt/altshop/webapp/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API для Web App
    location /api/v1 {
        proxy_pass http://$upstream_altshop;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Telegram webhook - только для бота
    location /telegram {
        proxy_pass http://$upstream_altshop;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Remnawave webhook
    location /remnawave {
        proxy_pass http://$upstream_altshop;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Payments webhook
    location /payments {
        proxy_pass http://$upstream_altshop;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Все остальные запросы к altshop (бот)
    location / {
        proxy_http_version 1.1;
        proxy_pass http://$upstream_altshop;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # SSL Configuration (Mozilla Intermediate Guidelines)
    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_ciphers            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;

    ssl_session_timeout    1d;
    ssl_session_cache      shared:MozSSL:10m;
    ssl_session_tickets    off;
    ssl_certificate        "/etc/nginx/ssl/fullchain.pem";
    ssl_certificate_key    "/etc/nginx/ssl/privkey.key";
    ssl_trusted_certificate "/etc/nginx/ssl/fullchain.pem";

    ssl_stapling           on;
    ssl_stapling_verify    on;

    proxy_hide_header      Strict-Transport-Security;
    add_header             Strict-Transport-Security "max-age=15552000" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
}

# Default server to reject SSL handshakes for unknown hosts
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;
    ssl_reject_handshake on;
    
    # Return 444 for any request to unknown hosts
    return 444;
}
