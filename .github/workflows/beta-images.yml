name: Beta Images

on:
  push:
    branches:
      - beta

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/dizzzable/altshop-backend:beta
            ghcr.io/dizzzable/altshop-backend:beta-${{ github.sha }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/dizzzable/altshop-nginx:beta
            ghcr.io/dizzzable/altshop-nginx:beta-${{ github.sha }}
