name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.15"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync backend dependencies
        run: uv sync --locked --group dev

      - name: Run backend runtime-pin smoke tests
        run: |
          uv run python -m pytest tests/services/test_remnawave_service.py -q
          uv run python -m pytest tests/services/test_lifespan_startup_tasks.py -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Type-check frontend
        run: npm run type-check

      - name: Build frontend
        run: npm run build
