name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --locked --group dev

      - name: Ruff backend scope
        run: uv run python -m ruff check src tests

      - name: Ruff full C901 strict
        run: uv run python -m ruff check src tests --select C901 --ignore-noqa --line-length 100

      - name: Pytest full backend
        run: uv run python -m pytest -q

      - name: Mypy full backend
        run: uv run python -m mypy src

  frontend-wave2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Type-check frontend
        run: npm run type-check

      - name: Build frontend
        run: npm run build
