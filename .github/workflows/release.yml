name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive release version
        id: vars
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate tag against project versions
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          tag_name = os.environ["TAG_NAME"]
          version = tag_name.removeprefix("v")

          with Path("pyproject.toml").open("rb") as fh:
              python_version = tomllib.load(fh)["project"]["version"]

          web_version = json.loads(
              Path("web-app/package.json").read_text(encoding="utf-8")
          )["version"]

          if python_version != version:
              raise SystemExit(
                  f"pyproject.toml version {python_version!r} does not match tag {tag_name!r}"
              )

          if web_version != version:
              raise SystemExit(
                  f"web-app/package.json version {web_version!r} does not match tag {tag_name!r}"
              )
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/dizzzable/altshop-backend:${{ steps.vars.outputs.version }}
            ghcr.io/dizzzable/altshop-backend:latest

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/dizzzable/altshop-nginx:${{ steps.vars.outputs.version }}
            ghcr.io/dizzzable/altshop-nginx:latest

      - name: Build release notes from changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python scripts/build_release_notes.py \
            --version "${TAG_NAME#v}" \
            --tag "${TAG_NAME}" \
            --changelog CHANGELOG.md \
            --template .github/release-template.md \
            --output release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AltShop ${{ github.ref_name }}
          body_path: release-notes.md

      - name: Notify production about published release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_NOTIFY_URL: ${{ secrets.RELEASE_NOTIFY_URL }}
          RELEASE_NOTIFY_SECRET: ${{ secrets.RELEASE_NOTIFY_SECRET }}
        run: |
          if [ -z "${RELEASE_NOTIFY_URL}" ] || [ -z "${RELEASE_NOTIFY_SECRET}" ]; then
            echo "::warning::Release notify skipped because RELEASE_NOTIFY_URL or RELEASE_NOTIFY_SECRET is not configured."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.request

          release_tag = os.environ["RELEASE_TAG"]
          notify_url = os.environ["RELEASE_NOTIFY_URL"]
          notify_secret = os.environ["RELEASE_NOTIFY_SECRET"]

          release_json = subprocess.check_output(
              [
                  "gh",
                  "release",
                  "view",
                  release_tag,
                  "--json",
                  "tagName,name,url,publishedAt",
              ],
              text=True,
          )
          release = json.loads(release_json)
          payload = json.dumps(
              {
                  "version": release["tagName"].removeprefix("v"),
                  "tag_name": release["tagName"],
                  "name": release.get("name"),
                  "html_url": release["url"],
                  "published_at": release["publishedAt"],
              }
          ).encode("utf-8")

          request = urllib.request.Request(
              notify_url,
              data=payload,
              headers={
                  "Authorization": f"Bearer {notify_secret}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request) as response:
                  if response.status < 200 or response.status >= 300:
                      raise SystemExit(
                          f"Release notify request failed with status {response.status}"
                      )
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              raise SystemExit(
                  f"Release notify request failed with status {exc.code}: {body}"
              ) from exc
          except urllib.error.URLError as exc:
              raise SystemExit(f"Release notify request could not reach backend: {exc}") from exc
          PY
