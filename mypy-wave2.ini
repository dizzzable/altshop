[mypy]
python_version = 3.12
warn_unused_configs = True
ignore_missing_imports = True
follow_imports = skip

[mypy-src.api.endpoints.user]
disable_error_code = assignment,arg-type,union-attr

[mypy-src.infrastructure.taskiq.tasks.subscriptions]
disable_error_code = assignment

[mypy-src.services.remnawave]
disable_error_code = unused-ignore
